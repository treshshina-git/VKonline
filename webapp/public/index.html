<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>VK Live</title>
  <style>
    html, body { margin: 0; padding: 0; background: #000; width: 100%; height: 100%; }
    .wrap { width: 100%; height: 100%; }
    iframe { width: 100%; height: 100%; border: 0; }
    .fallback { color: #fff; padding: 16px; font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; }
    a { color: #4da3ff; }
  </style>
</head>
<body>
  <div class="wrap">
    <iframe id="frame" allow="autoplay; fullscreen; picture-in-picture" allowfullscreen></iframe>
  </div>
  <div class="fallback" id="fallback" style="display:none">
    Видео: <a id="link" href="#" target="_blank" rel="noopener noreferrer">открыть</a>
  </div>

  <script>
    // Telegram WebApp обычно открывает страницу с querystring.
    // Мы ожидаем параметр urik и перенаправляем на /play?urik=...

    const qs = new URLSearchParams(location.search);
    const urik = qs.get('urik') || '';

    // Если в запросе использовали /?play=1, а urik передан отдельно — учитываем только urik.
    // Если urik отсутствует — просто откроем /play без параметров.

    const base = location.origin; // домен, на котором открыли WebApp
    const playUrl = urik
      ? `${base}/play?urik=${encodeURIComponent(urik)}`
      : `${base}/play`;

    const iframe = document.getElementById('frame');
    const fallback = document.getElementById('fallback');
    const link = document.getElementById('link');

    try {
      iframe.src = playUrl;
    } catch (e) {
      fallback.style.display = 'block';
      link.href = playUrl;
      link.textContent = playUrl;
    }
  </script>
</body>
</html>
